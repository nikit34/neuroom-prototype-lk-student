<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f1a">
<title>Neuroom — Опросы</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e8e8f0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-top: calc(env(safe-area-inset-top, 0) + 24px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0) + 24px);
  }
  .hub {
    max-width: 400px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px;
    text-align: center;
  }
  .hub-icon {
    font-size: 56px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .hub-title {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #e8e8f0, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hub-sub {
    font-size: 15px;
    color: #8888a0;
    line-height: 1.5;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 8px;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #1a1a2e;
    border: 2px solid #2a2a40;
    border-radius: 18px;
    padding: 20px;
    text-decoration: none;
    color: #e8e8f0;
    transition: all .2s;
  }
  .card:active {
    transform: scale(.98);
    border-color: #7c5cfc;
    background: rgba(124,92,252,.08);
  }
  @media (hover: hover) {
    .card:hover {
      border-color: #7c5cfc;
      background: rgba(124,92,252,.08);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,92,252,.2);
    }
  }
  .card-icon {
    font-size: 40px;
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(124,92,252,.12);
    border-radius: 14px;
  }
  .card-body { text-align: left; }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 13px;
    color: #8888a0;
    line-height: 1.4;
  }
  .card-arrow {
    margin-left: auto;
    font-size: 20px;
    color: #8888a0;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="hub">
  <div class="hub-icon">&#128640;</div>
  <div class="hub-title">Neuroom Beta</div>
  <div class="hub-sub">Помоги нам сделать приложение лучше</div>

  <div class="cards">
    <a href="ux-survey/" class="card">
      <div class="card-icon">&#128270;</div>
      <div class="card-body">
        <div class="card-title">UX-опрос</div>
        <div class="card-desc">Расскажи, как было пользоваться прототипом. 11 вопросов, 3-4 минуты.</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </a>

    <a href="design-battle/" class="card">
      <div class="card-icon">&#127912;</div>
      <div class="card-body">
        <div class="card-title">Битва экранов</div>
        <div class="card-desc">Выбери лучший дизайн из двух вариантов. Быстро и весело.</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </a>
  </div>
</div>
</body>
</html>
