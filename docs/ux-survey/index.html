<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>Neuroom — Бета-опрос</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #7c5cfc;
    --accent-light: #a78bfa;
    --accent-glow: rgba(124, 92, 252, 0.3);
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --success: #34d399;
    --border: #2a2a40;
    --input-bg: #12121f;
    --radius: 16px;
    --chip-green: rgba(52,211,153,.15);
    --chip-green-border: #34d399;
    --chip-red: rgba(248,113,113,.12);
    --chip-red-border: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html {
    -webkit-text-size-adjust: 100%;
    height: -webkit-fill-available;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  /* ── Floating particles background ── */
  .particles {
    position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── Progress bar ── */
  .progress-wrap {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 5px; background: var(--border);
    top: env(safe-area-inset-top, 0);
  }
  .progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), #ec4899, #f59e0b);
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    border-radius: 0 3px 3px 0;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* ── Container ── */
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 140px;
    padding-top: calc(env(safe-area-inset-top, 0) + 20px);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Screen ── */
  .screen {
    display: none;
    flex-direction: column;
    gap: 20px;
    flex: 1;
  }
  .screen.active { display: flex; }
  .screen.animate { animation: fadeUp .4s cubic-bezier(.2,.8,.3,1); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Question icon ── */
  .q-icon {
    font-size: 48px;
    text-align: center;
  }
  .animate .q-icon {
    animation: bounceIn .5s cubic-bezier(.2,.8,.3,1.2);
  }
  @keyframes bounceIn {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); }
  }

  .q-number {
    font-size: 13px;
    color: var(--accent-light);
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .q-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.35;
  }
  .q-hint {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── Textarea ── */
  textarea {
    width: 100%;
    min-height: 100px;
    background: var(--input-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    padding: 16px;
    resize: vertical;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea::placeholder { color: var(--text-dim); }

  /* ── Short text ── */
  input[type="text"] {
    width: 100%;
    background: var(--input-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 22px;
    font-family: inherit;
    padding: 18px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    text-align: center;
    letter-spacing: 2px;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  input[type="text"]::placeholder { color: var(--text-dim); letter-spacing: 0; }

  /* ── Single choice ── */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: var(--input-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 14px 18px;
    min-height: 48px;
    text-align: left;
    cursor: pointer;
    transition: all .2s;
    line-height: 1.4;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(124,92,252,.15), transparent 60%);
    opacity: 0; transition: opacity .3s;
  }
  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:hover { border-color: var(--accent); }
  .choice-btn.selected {
    border-color: var(--accent);
    background: rgba(124,92,252,.15);
    box-shadow: 0 0 0 1px var(--accent);
    animation: selectPop .3s ease-out;
  }
  @keyframes selectPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  /* ── Multi-select chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    background: var(--input-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    padding: 12px 16px;
    min-height: 44px;
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: all .25s cubic-bezier(.2,.8,.3,1);
    user-select: none;
    line-height: 1.3;
  }
  .chip:hover { border-color: var(--accent); background: rgba(124,92,252,.06); transform: translateY(-1px); }
  .chip.selected {
    border-color: var(--accent);
    background: rgba(124,92,252,.18);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 12px var(--accent-glow);
    transform: translateY(-2px);
    animation: chipPop .3s ease-out;
  }
  @keyframes chipPop {
    0% { transform: scale(1) translateY(0); }
    40% { transform: scale(1.08) translateY(-4px); }
    100% { transform: scale(1) translateY(-2px); }
  }

  /* ── Dual-tag cards ── */
  .tag-cards { display: flex; flex-direction: column; gap: 8px; }
  .tag-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--input-bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: all .25s;
  }
  .tag-card.tagged-like {
    border-color: rgba(52,211,153,.4);
    background: rgba(52,211,153,.05);
  }
  .tag-card.tagged-meh {
    border-color: rgba(248,113,113,.4);
    background: rgba(248,113,113,.05);
  }
  .tag-card-label { font-size: 15px; flex: 1; padding-right: 8px; }
  .tag-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .tag-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: transparent;
    font-size: 20px;
    cursor: pointer;
    transition: all .25s cubic-bezier(.2,.8,.3,1);
    display: flex; align-items: center; justify-content: center;
  }
  .tag-btn:hover { border-color: var(--text-dim); transform: scale(1.1); }
  .tag-btn.tag-like.selected {
    border-color: var(--chip-green-border);
    background: var(--chip-green);
    animation: tagBounce .4s ease-out;
    transform: scale(1.1);
  }
  .tag-btn.tag-meh.selected {
    border-color: var(--chip-red-border);
    background: var(--chip-red);
    animation: tagBounce .4s ease-out;
    transform: scale(1.1);
  }
  @keyframes tagBounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    60% { transform: scale(.95); }
    100% { transform: scale(1.1); }
  }

  /* ── Conditional textarea ── */
  .conditional-input { display: none; margin-top: 4px; }
  .conditional-input.visible { display: block; animation: fadeUp .3s ease-out; }
  .conditional-input textarea { min-height: 70px; }

  /* ── Nav buttons ── */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 14px 20px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0) + 14px);
    background: linear-gradient(transparent, var(--bg) 25%);
    display: flex; gap: 10px; justify-content: center;
    z-index: 50;
  }
  .nav-btn {
    flex: 1; max-width: 220px;
    padding: 16px 24px; border-radius: 14px;
    font-size: 16px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all .15s; border: none;
    min-height: 50px;
  }
  .btn-back { background: var(--card); color: var(--text-dim); }
  .btn-back:hover { background: var(--border); color: var(--text); }
  .btn-next {
    background: linear-gradient(135deg, var(--accent), #9333ea);
    color: #fff;
    box-shadow: 0 4px 15px var(--accent-glow);
  }
  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
  .btn-next:disabled { opacity: .4; cursor: default; transform: none; box-shadow: none; }
  .btn-next:disabled:hover { transform: none; box-shadow: none; }

  /* ── Welcome ── */
  .welcome-icon {
    font-size: 72px; text-align: center; margin-top: 30px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-8px) rotate(2deg); }
    75% { transform: translateY(4px) rotate(-1deg); }
  }
  .welcome-title {
    font-size: 26px; font-weight: 800; text-align: center; line-height: 1.3;
    background: linear-gradient(135deg, var(--text), var(--accent-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome-sub {
    font-size: 15px; color: var(--text-dim); text-align: center; line-height: 1.6;
  }
  .welcome-pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 16px; font-size: 13px; color: var(--text-dim);
    animation: fadeUp .5s ease-out both;
  }
  .pill:nth-child(1) { animation-delay: .1s; }
  .pill:nth-child(2) { animation-delay: .2s; }
  .pill:nth-child(3) { animation-delay: .3s; }

  /* ── Finish ── */
  .finish-icon {
    font-size: 80px; text-align: center; margin-top: 50px;
    animation: finishPop .6s cubic-bezier(.2,.8,.3,1.3);
  }
  @keyframes finishPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); }
  }
  .finish-title {
    font-size: 28px; font-weight: 800; text-align: center;
    background: linear-gradient(135deg, var(--success), #60a5fa, var(--accent-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .finish-sub {
    font-size: 15px; color: var(--text-dim); text-align: center; line-height: 1.6;
  }

  /* ── Halfway celebration ── */
  .halfway-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: linear-gradient(135deg, #7c5cfc, #ec4899);
    color: #fff; font-size: 15px; font-weight: 700;
    padding: 12px 24px; border-radius: 30px;
    z-index: 150; pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(124,92,252,.4);
  }
  .halfway-toast.show {
    animation: toastSlide 2.5s cubic-bezier(.2,.8,.3,1) forwards;
  }
  @keyframes toastSlide {
    0% { transform: translateX(-50%) translateY(-100px); opacity: 0; }
    15% { transform: translateX(-50%) translateY(0); opacity: 1; }
    80% { transform: translateX(-50%) translateY(0); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-100px); opacity: 0; }
  }

  /* ── Confetti canvas ── */
  #confetti {
    position: fixed; inset: 0; z-index: 100; pointer-events: none;
  }

  /* ── Sending overlay ── */
  .sending-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,15,26,.85); z-index: 200;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .sending-overlay.visible { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Touch devices: replace hover with active ── */
  @media (hover: none) and (pointer: coarse) {
    .choice-btn:hover { border-color: var(--border); background: var(--input-bg); }
    .choice-btn:hover::before { opacity: 0; }
    .choice-btn:active { border-color: var(--accent); background: rgba(124,92,252,.12); }

    .chip:hover { border-color: var(--border); background: var(--input-bg); transform: none; }
    .chip:active { border-color: var(--accent); background: rgba(124,92,252,.12); transform: scale(.97); }

    .tag-btn:hover { border-color: var(--border); transform: none; }
    .tag-btn:active { transform: scale(.9); }

    .btn-next:hover { transform: none; }
    .btn-next:active:not(:disabled) { transform: scale(.97); }
    .btn-back:hover { background: var(--card); color: var(--text-dim); }
    .btn-back:active { background: var(--border); }
  }

  /* ── Mobile (iPhone 11 = 414px, most phones) ── */
  @media (max-width: 480px) {
    .app {
      padding: 16px 16px 150px;
      padding-top: calc(env(safe-area-inset-top, 0) + 14px);
    }
    .screen { gap: 16px; }
    .q-icon { font-size: 42px; }
    .q-text { font-size: 20px; }
    .q-hint { font-size: 13px; }
    .q-number { font-size: 12px; }

    .welcome-icon { font-size: 60px; margin-top: 20px; }
    .welcome-title { font-size: 22px; padding: 0 8px; }
    .welcome-sub { font-size: 14px; }

    .finish-icon { font-size: 64px; margin-top: 40px; }
    .finish-title { font-size: 24px; }

    textarea { min-height: 90px; font-size: 16px; padding: 14px; }
    input[type="text"] { font-size: 18px; padding: 16px; }

    .chips { gap: 8px; }
    .chip { font-size: 14px; padding: 10px 14px; min-height: 44px; }

    .tag-card { padding: 8px 10px; }
    .tag-card-label { font-size: 14px; }
    .tag-btn { width: 44px; height: 44px; font-size: 20px; }
    .tag-btns { gap: 8px; }

    .choice-btn { font-size: 15px; padding: 14px 16px; }

    .nav { padding: 12px 16px; padding-bottom: calc(env(safe-area-inset-bottom, 0) + 12px); }
    .nav-btn { padding: 16px 20px; font-size: 16px; border-radius: 12px; }

    .halfway-toast { font-size: 14px; padding: 10px 20px; }
  }

  /* ── Small phones (iPhone SE = 375px) ── */
  @media (max-width: 380px) {
    .q-text { font-size: 18px; }
    .q-icon { font-size: 36px; }
    .welcome-icon { font-size: 50px; }
    .welcome-title { font-size: 20px; }
    .chip { font-size: 13px; padding: 9px 12px; }
    .tag-btn { width: 40px; height: 40px; font-size: 18px; }
    .tag-card-label { font-size: 13px; }
  }

  /* ── Theme toggle button ── */
  .theme-btn {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0) + 14px);
    right: 16px;
    z-index: 110;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, border-color .2s, background .3s;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  .theme-btn:active { transform: scale(.88) rotate(-20deg); }
  @media (hover: hover) {
    .theme-btn:hover { border-color: var(--accent); transform: scale(1.1); }
  }

  .theme-toast {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0) + 64px);
    right: 16px;
    z-index: 110;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 12px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-8px) scale(.95);
    transition: opacity .2s, transform .2s;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
  }
  .theme-toast.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* ── iOS keyboard: scroll input into view ── */
  @supports (-webkit-touch-callout: none) {
    body { height: -webkit-fill-available; }
    textarea:focus, input[type="text"]:focus {
      scroll-margin-bottom: 160px;
    }
  }
</style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="app" id="app"></div>

<div class="nav" id="nav" style="display:none">
  <button class="nav-btn btn-back" id="btnBack" onclick="goBack()">Назад</button>
  <button class="nav-btn btn-next" id="btnNext" onclick="goNext()">Дальше</button>
</div>

<button class="theme-btn" id="themeBtn" onclick="cycleTheme()" aria-label="Сменить тему">&#127912;</button>
<div class="theme-toast" id="themeToast"></div>

<div class="halfway-toast" id="halfwayToast">&#128170; Половина позади!</div>

<canvas id="confetti"></canvas>

<div class="sending-overlay" id="sendingOverlay">
  <div class="spinner"></div>
  <div style="color:var(--text-dim);font-size:15px">Отправляем ответы...</div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const GOOGLE_SCRIPT_URL = '';

// ══════════════════════════════════════════
// THEMES (from Neuroom prototype)
// ══════════════════════════════════════════
const THEMES = [
  // ── Dark ──
  { name: 'Neuroom',         emoji: '🟣', bg: '#0f0f1a', card: '#1a1a2e', accent: '#7c5cfc', accentLight: '#a78bfa', text: '#e8e8f0', textDim: '#8888a0', border: '#2a2a40', inputBg: '#12121f' },
  { name: 'Valorant',        emoji: '🎯', bg: '#0E0E1A', card: '#1A1A2E', accent: '#FF4655', accentLight: '#FF8090', text: '#ECE8E1', textDim: '#8A88A0', border: '#2E2E42', inputBg: '#141420' },
  { name: 'Gagarin',         emoji: '🚀', bg: '#0A0A1E', card: '#161640', accent: '#6C5CE7', accentLight: '#A29BFE', text: '#E8E0FF', textDim: '#8A82B0', border: '#2A2A60', inputBg: '#0E0E2A' },
  { name: 'CS:GO',           emoji: '🔫', bg: '#1A1A1A', card: '#2A2A2A', accent: '#E87B35', accentLight: '#F5A623', text: '#F0E6D8', textDim: '#9A9080', border: '#3D3830', inputBg: '#1E1E1E' },
  { name: 'Fortnite',        emoji: '🪂', bg: '#100A20', card: '#1C1438', accent: '#9D4DFF', accentLight: '#C080FF', text: '#E8E0FF', textDim: '#9080B8', border: '#302850', inputBg: '#140E28' },
  { name: 'Stranger Things', emoji: '🔦', bg: '#0A0508', card: '#1A0E14', accent: '#C41E3A', accentLight: '#E85050', text: '#F0E0E0', textDim: '#A08088', border: '#3A1828', inputBg: '#10080E' },
  // ── Light ──

let currentTheme = 0;
let themeSwitchCount = 0;
let themeToastTimer = null;

function applyTheme(t) {
  const r = document.documentElement.style;
  r.setProperty('--bg', t.bg);
  r.setProperty('--card', t.card);
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-light', t.accentLight);
  r.setProperty('--accent-glow', t.accent + '4D'); // 30% opacity
  r.setProperty('--text', t.text);
  r.setProperty('--text-dim', t.textDim);
  r.setProperty('--border', t.border);
  r.setProperty('--input-bg', t.inputBg);
  // Update meta theme-color for mobile browser chrome
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = t.bg;
  // Update particles color
  document.querySelectorAll('.particle').forEach((p, i) => {
    const colors = [t.accent, t.accentLight, t.textDim];
    p.style.background = colors[i % colors.length];
  });
}

function cycleTheme() {
  currentTheme = (currentTheme + 1) % THEMES.length;
  themeSwitchCount++;
  const t = THEMES[currentTheme];
  applyTheme(t);
  // Show toast
  const toast = document.getElementById('themeToast');
  toast.innerHTML = t.emoji + ' ' + t.name;
  toast.classList.add('show');
  clearTimeout(themeToastTimer);
  themeToastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
}

// ══════════════════════════════════════════
const confettiCanvas = document.getElementById('confetti');
const ctx = confettiCanvas.getContext('2d');
let confettiPieces = [];
let confettiRunning = false;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function launchConfetti() {
  confettiPieces = [];
  const colors = ['#7c5cfc','#a78bfa','#ec4899','#34d399','#f59e0b','#60a5fa','#f472b6'];
  const isMobile = window.innerWidth <= 480;
  const count = isMobile ? 50 : 80;
  const spread = isMobile ? 120 : 200;
  for (let i = 0; i < count; i++) {
    confettiPieces.push({
      x: confettiCanvas.width / 2 + (Math.random() - .5) * spread,
      y: confettiCanvas.height * 0.4,
      vx: (Math.random() - .5) * (isMobile ? 10 : 15),
      vy: -8 - Math.random() * 10,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - .5) * 10,
      life: 1,
    });
  }
  if (!confettiRunning) { confettiRunning = true; animateConfetti(); }
}

function animateConfetti() {
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiPieces = confettiPieces.filter(p => p.life > 0);
  if (confettiPieces.length === 0) { confettiRunning = false; return; }
  confettiPieces.forEach(p => {
    p.x += p.vx;
    p.vy += 0.3;
    p.y += p.vy;
    p.rotation += p.rotSpeed;
    p.life -= 0.008;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    ctx.restore();
  });
  requestAnimationFrame(animateConfetti);
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let current = 0;
const answers = {};
let halfwayShown = false;
let shouldAnimate = true; // only true on screen transitions

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const q = questions[current];
  const nav = document.getElementById('nav');

  const realQuestions = questions.filter(q => !q.skip);
  const currentReal = realQuestions.indexOf(q);
  const pct = q.type === 'finish' ? 100 : q.type === 'welcome' ? 0 :
    (currentReal / realQuestions.length * 100);
  document.getElementById('progressBar').style.width = pct + '%';

  // Halfway celebration
  if (currentReal === Math.floor(realQuestions.length / 2) && !halfwayShown) {
    halfwayShown = true;
    const toast = document.getElementById('halfwayToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2600);
  }

  const animClass = shouldAnimate ? ' animate' : '';
  shouldAnimate = false; // reset after use
  let html = `<div class="screen active${animClass}" id="screen-${q.id}">`;

  // ── Welcome ──
  if (q.type === 'welcome') {
    html += `
      <div class="welcome-icon">&#128270;</div>
      <div class="welcome-title">Ты потестил(а) Neuroom&nbsp;— расскажи, как это было</div>
      <div class="welcome-sub">
        Это не тест и не проверка знаний. Правильных ответов нет.<br>
        Мы проверяем приложение, а не тебя.<br>
        Если что-то было непонятно&nbsp;— это наша проблема, не твоя.
      </div>
      <div class="welcome-pills">
        <div class="pill">&#9201; 3-4 минуты</div>
        <div class="pill">11 вопросов</div>
        <div class="pill">&#128274; анонимно</div>
      </div>
    `;
    nav.style.display = 'flex';
    document.getElementById('btnBack').style.display = 'none';
    document.getElementById('btnNext').textContent = 'Начать';
    document.getElementById('btnNext').disabled = false;
    html += '</div>';
    app.innerHTML = html;
    return;
  }

  // ── Finish ──
  if (q.type === 'finish') {
    html += `
      <div class="finish-icon">&#127881;</div>
      <div class="finish-title">Готово!</div>
      <div class="finish-sub">
        Спасибо, что поделился(лась) своим опытом.<br>
        Это реально поможет сделать Neuroom лучше.
      </div>
    `;
    nav.style.display = 'none';
    html += '</div>';
    app.innerHTML = html;
    launchConfetti();
    return;
  }

  // ── Regular question ──
  nav.style.display = 'flex';
  document.getElementById('btnBack').style.display = current > 1 ? '' : 'none';
  document.getElementById('btnNext').textContent =
    current === questions.length - 2 ? 'Отправить' : 'Дальше';

  // Question icon
  if (Q_ICONS[q.id]) {
    html += `<div class="q-icon">${Q_ICONS[q.id]}</div>`;
  }

  html += `<div class="q-number">Вопрос ${q.number} из ${q.total}</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  if (q.hint) html += `<div class="q-hint">${q.hint}</div>`;

  const saved = answers[q.id] || {};

  if (q.type === 'textarea') {
    html += `<textarea id="input-${q.id}" placeholder="${q.placeholder || ''}"
      oninput="onInput('${q.id}')">${saved.value || ''}</textarea>`;
  }

  if (q.type === 'short_text') {
    html += `<input type="text" id="input-${q.id}" placeholder="${q.placeholder || ''}"
      value="${saved.value || ''}" oninput="onInput('${q.id}')" maxlength="60">`;
  }

  if (q.type === 'choice') {
    html += '<div class="choices">';
    q.choices.forEach((c, i) => {
      const sel = saved.choiceIndex === i ? 'selected' : '';
      html += `<button class="choice-btn ${sel}" onclick="onChoice('${q.id}', ${i})">${c}</button>`;
    });
    html += '</div>';
    if (q.followUp) {
      const visible = q.followUp.triggers.includes(saved.choiceIndex) ? 'visible' : '';
      html += `<div class="conditional-input ${visible}" id="followup-${q.id}">
        <div class="q-hint" style="margin-bottom:8px">${q.followUp.text}</div>
        <textarea id="followup-input-${q.id}" placeholder="${q.followUp.placeholder || ''}"
          oninput="onFollowUp('${q.id}')">${saved.followUp || ''}</textarea>
      </div>`;
    }
  }

  if (q.type === 'multiselect') {
    const selected = saved.selected || [];
    html += '<div class="chips">';
    q.options.forEach((opt, i) => {
      const sel = selected.includes(i) ? 'selected' : '';
      html += `<button class="chip ${sel}" onclick="onMulti('${q.id}', ${i})">${opt.label}</button>`;
    });
    html += '</div>';
  }

  if (q.type === 'tags') {
    const tags = saved.tags || {};
    html += '<div class="tag-cards">';
    q.items.forEach((item, i) => {
      const likeClass = tags[i] === 'like' ? 'selected' : '';
      const mehClass = tags[i] === 'meh' ? 'selected' : '';
      const cardClass = tags[i] === 'like' ? 'tagged-like' : tags[i] === 'meh' ? 'tagged-meh' : '';
      html += `<div class="tag-card ${cardClass}">
        <div class="tag-card-label">${item}</div>
        <div class="tag-btns">
          <button class="tag-btn tag-like ${likeClass}" onclick="onTag('${q.id}', ${i}, 'like')">${q.tagLabels[0]}</button>
          <button class="tag-btn tag-meh ${mehClass}" onclick="onTag('${q.id}', ${i}, 'meh')">${q.tagLabels[1]}</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  app.innerHTML = html;
  updateNextBtn();
}

// ══════════════════════════════════════════
// HANDLERS
// ══════════════════════════════════════════
function onInput(id) {
  const el = document.getElementById('input-' + id);
  if (!answers[id]) answers[id] = {};
  answers[id].value = el.value;
  updateNextBtn();
}

function onChoice(id, index) {
  const q = questions.find(q => q.id === id);
  if (!answers[id]) answers[id] = {};
  answers[id].choiceIndex = index;
  answers[id].value = q.choices[index];
  if (q.followUp) {
    const fu = document.getElementById('followup-' + id);
    if (q.followUp.triggers.includes(index)) {
      fu.classList.add('visible');
      setTimeout(() => {
        const inp = document.getElementById('followup-input-' + id);
        if (inp) inp.focus();
      }, 100);
    } else {
      fu.classList.remove('visible');
      answers[id].followUp = '';
    }
  }
  render();
}

function onFollowUp(id) {
  const el = document.getElementById('followup-input-' + id);
  if (!answers[id]) answers[id] = {};
  answers[id].followUp = el.value;
}

function onMulti(id, index) {
  const q = questions.find(q => q.id === id);
  if (!answers[id]) answers[id] = { selected: [] };
  if (!answers[id].selected) answers[id].selected = [];

  const opt = q.options[index];

  if (opt.exclusive) {
    if (answers[id].selected.includes(index)) {
      answers[id].selected = [];
    } else {
      answers[id].selected = [index];
    }
  } else {
    const exclusiveIndices = q.options
      .map((o, i) => o.exclusive ? i : -1).filter(i => i >= 0);
    answers[id].selected = answers[id].selected.filter(i => !exclusiveIndices.includes(i));
    const pos = answers[id].selected.indexOf(index);
    if (pos >= 0) { answers[id].selected.splice(pos, 1); }
    else { answers[id].selected.push(index); }
  }

  answers[id].value = answers[id].selected.map(i => q.options[i].label).join(', ');
  render();
}

function onTag(id, index, tag) {
  const q = questions.find(q => q.id === id);
  if (!answers[id]) answers[id] = { tags: {} };
  if (!answers[id].tags) answers[id].tags = {};

  if (answers[id].tags[index] === tag) { delete answers[id].tags[index]; }
  else { answers[id].tags[index] = tag; }

  const liked = [], meh = [];
  Object.entries(answers[id].tags).forEach(([i, t]) => {
    if (t === 'like') liked.push(q.items[i]);
    if (t === 'meh') meh.push(q.items[i]);
  });
  answers[id].value = '';
  if (liked.length) answers[id].value += 'fire: ' + liked.join(', ');
  if (meh.length) answers[id].value += (answers[id].value ? '; ' : '') + 'meh: ' + meh.join(', ');

  render();
}

// ══════════════════════════════════════════
// VALIDATION
// ══════════════════════════════════════════
function isAnswered(q) {
  if (q.skip || !q.required) return true;
  const a = answers[q.id];
  if (!a) return false;
  if (q.type === 'textarea' || q.type === 'short_text') return (a.value || '').trim().length > 0;
  if (q.type === 'choice') return a.choiceIndex !== undefined;
  if (q.type === 'multiselect') return (a.selected || []).length >= (q.minSelect || 1);
  if (q.type === 'tags') return true;
  return true;
}

function updateNextBtn() {
  const q = questions[current];
  document.getElementById('btnNext').disabled = !isAnswered(q);
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function goNext() {
  const q = questions[current];
  if (!isAnswered(q) && !q.skip) return;
  if (current === questions.length - 2) { submitAnswers(); return; }
  current++;
  shouldAnimate = true;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (current > 1) { current--; shouldAnimate = true; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

// ══════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════
async function submitAnswers() {
  const overlay = document.getElementById('sendingOverlay');
  overlay.classList.add('visible');

  const data = {
    timestamp: new Date().toISOString(),
    theme_switches: themeSwitchCount,
    final_theme: THEMES[currentTheme].name,
  };

  questions.forEach(q => {
    if (q.skip) return;
    const a = answers[q.id] || {};
    data[q.id] = a.value || '';
    if (a.followUp) data[q.id + '_detail'] = a.followUp;
    if (q.type === 'multiselect' && q.options[0] && q.options[0].real !== undefined) {
      const sel = a.selected || [];
      data[q.id + '_correct'] = sel.filter(i => q.options[i].real).map(i => q.options[i].label).join(', ');
      data[q.id + '_wrong'] = sel.filter(i => !q.options[i].real && !q.options[i].special).map(i => q.options[i].label).join(', ');
    }
  });

  if (GOOGLE_SCRIPT_URL) {
    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
    } catch (e) {
      console.error('Submit error:', e);
      saveLocal(data);
    }
  } else {
    saveLocal(data);
  }

  overlay.classList.remove('visible');
  current = questions.length - 1;
  shouldAnimate = true;
  render();
}

function saveLocal(data) {
  const key = 'neuroom_survey_responses';
  const existing = JSON.parse(localStorage.getItem(key) || '[]');
  existing.push(data);
  localStorage.setItem(key, JSON.stringify(existing));
  console.log('Response saved locally:', data);
}

// ══════════════════════════════════════════
// KEYBOARD + HOVER EFFECT
// ══════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) goNext();
});

// Radial hover glow on choice buttons (desktop only)
if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', (e) => {
    const btn = e.target.closest('.choice-btn');
    if (btn) {
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty('--x', ((e.clientX - rect.left) / rect.width * 100) + '%');
      btn.style.setProperty('--y', ((e.clientY - rect.top) / rect.height * 100) + '%');
    }
  });
}

// iOS: scroll focused input into view above keyboard
document.addEventListener('focusin', (e) => {
  if (e.target.matches('textarea, input[type="text"]')) {
    setTimeout(() => {
      e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300); // wait for iOS keyboard animation
  }
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
render();
</script>
</body>
</html>
